services:
  subscriptions-service:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: cmd/api/Dockerfile
    container_name: subs-service
    environment:
      - SERVER_PORT=8080
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "8080:8080"
    restart: always

  subscriptions-postgres:
    image: postgres:18.4-bookworm
    container_name: subscriptions-env-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always

  subscriptions-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations

  swagger:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: Dockerfile
    volumes:
      - .:/code